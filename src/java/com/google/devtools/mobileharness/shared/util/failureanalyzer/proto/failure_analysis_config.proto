syntax = "proto3";

package com.google.devtools.mobileharness.shared.util.failureanalyzer.proto;

option java_package = "com.google.devtools.mobileharness.shared.util.failureanalyzer.proto";
option java_outer_classname = "FailureAnalysisConfigProto";

// A pattern to match in log files to identify failure reasons.
message FailureAnalysisPattern {
  // The name of the file to scan (e.g., "cobalt.log").
  // Note: "test_output.txt" is a special filename that triggers in-memory
  // scanning of the test output.
  string file_name = 1;

  // The regex pattern to look for in the file.
  string pattern = 2;

  // The message to surface if the pattern is found.
  string message = 3;
}

// Configuration containing multiple failure analysis patterns.
message FailureAnalysisConfig {
  repeated FailureAnalysisPattern pattern = 1;
}
