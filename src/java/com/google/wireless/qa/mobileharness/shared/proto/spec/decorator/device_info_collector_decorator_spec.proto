syntax = "proto2";

package mobileharness.shared.spec;

import "src/java/com/google/wireless/qa/mobileharness/shared/proto/spec/base_spec.proto";

option java_package = "com.google.wireless.qa.mobileharness.shared.proto.spec.decorator";
option java_multiple_files = true;
option java_outer_classname = "DeviceInfoCollectorDecoratorSpecProto";

// Specs for DeviceInfoCollectorDecorator.
message DeviceInfoCollectorDecoratorSpec {
  extend DecoratorSpec {
    optional DeviceInfoCollectorDecoratorSpec ext = 1024;
  }

  // The APK file name to instrument (e.g., "AtsDeviceInfo.apk").
  optional string apk = 1
      [(field_detail) = { help: "Name of the apk to instrument" }];

  // The package name of the APK.
  optional string package_name = 2
      [(field_detail) = { help: "Name of the package" }];

  // The path to the xTS test directory containing the APK.
  optional string xts_test_dir = 3
      [(field_detail) = { help: "The xts test dir which contains the APK." }];

  // Whether device info collection should be skipped.
  optional bool skip_device_info = 4 [
    default = false,
    (field_detail) = {
      help: "Whether device info collection should be skipped"
    }
  ];

  // Force device info collection. If set to true, skip_device_info is ignored.
  optional bool force_collect_device_info = 5 [
    default = false,
    (field_detail) = { help: "Force device info collection" }
  ];

  // The directory on device to copy to the results dir.
  optional string src_dir = 6 [
    default = "/sdcard/device-info-files/",
    (field_detail) = {
      help: "The directory on device to copy to the results dir"
    }
  ];

  // The directory under the result to store the files.
  optional string dest_dir = 7 [
    default = "device-info-files",
    (field_detail) = {
      help: "The directory under the result to store the files"
    }
  ];
}
