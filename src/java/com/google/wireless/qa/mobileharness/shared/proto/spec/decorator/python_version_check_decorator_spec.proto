syntax = "proto2";

package mobileharness.shared.spec;

import "src/java/com/google/wireless/qa/mobileharness/shared/proto/spec/base_spec.proto";

option java_package = "com.google.wireless.qa.mobileharness.shared.proto.spec.decorator";
option java_multiple_files = true;
option java_outer_classname = "PythonVersionCheckDecoratorSpecProto";

// Specs for PythonVersionCheckDecorator.
// Next ID: 3
message PythonVersionCheckDecoratorSpec {
  extend DecoratorSpec {
    optional PythonVersionCheckDecoratorSpec ext = 1018;
  }

  optional string min_python_version = 1
      [(field_detail) = { help: "The minimum Python version required." }];

  optional string python_version = 2
      [(field_detail) = { help: "The specific Python version required." }];
}
