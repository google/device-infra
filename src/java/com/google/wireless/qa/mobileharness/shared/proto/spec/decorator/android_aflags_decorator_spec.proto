syntax = "proto2";

package mobileharness.shared.spec;

import "src/java/com/google/wireless/qa/mobileharness/shared/proto/spec/base_spec.proto";

option java_package = "com.google.wireless.qa.mobileharness.shared.proto.spec.decorator";
option java_multiple_files = true;
option java_outer_classname = "AndroidAflagsDecoratorSpecOuterClass";

// Specs for AndroidAflagsDecorator.
message AndroidAflagsDecoratorSpec {
  extend DecoratorSpec {
    optional AndroidAflagsDecoratorSpec ext = 1025;
  }

  repeated string aflags_overrides = 1 [(field_detail) = {
    help: "A map or comma-separated list of flag-value pairs "
          "(e.g., flag_a=true,flag_b=false)."
  }];

  optional bool force_set = 2 [(field_detail) = {
    help: "Whether to force set flags even if the current value "
          "matches the target value."
  }];
}
