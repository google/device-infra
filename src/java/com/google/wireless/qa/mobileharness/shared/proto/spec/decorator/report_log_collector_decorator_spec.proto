syntax = "proto2";

package mobileharness.shared.spec;

import "src/java/com/google/wireless/qa/mobileharness/shared/proto/spec/base_spec.proto";

option java_package = "com.google.wireless.qa.mobileharness.shared.proto.spec.decorator";
option java_multiple_files = true;
option java_outer_classname = "ReportLogCollectorDecoratorSpecProto";

// Specs for ReportLogCollectorDecorator.
message ReportLogCollectorDecoratorSpec {
  extend DecoratorSpec {
    optional ReportLogCollectorDecoratorSpec ext = 1026;
  }

  // The directory on the device to copy to the results dir
  optional string src_dir = 1 [(field_detail) = {
    help: "The directory on the device to copy to the results dir"
  }];

  // The directory under the result to store the files
  optional string dest_dir = 2 [(field_detail) = {
    help: "The directory under the result to store the files"
  }];

  // The temp directory containing host-side report logs
  optional string temp_dir = 3 [(field_detail) = {
    help: "The temp directory containing host-side report logs"
  }];

  // Create unique directory for each device
  optional bool device_dir = 4
      [(field_detail) = { help: "Create unique directory for each device" }];
}
