syntax = "proto2";

package mobileharness.shared.spec;

import "src/java/com/google/wireless/qa/mobileharness/shared/proto/spec/base_spec.proto";

option java_package = "com.google.wireless.qa.mobileharness.shared.proto.spec.decorator";
option java_multiple_files = true;
option java_outer_classname = "AndroidSetWifiDecoratorSpecOuterClass";

// Specs for AndroidSetWifiDecorator.
message AndroidSetWifiDecoratorSpec {
  extend DecoratorSpec {
    optional AndroidSetWifiDecoratorSpec ext = 1027;
  }

  optional bool use_default_ssid = 1 [(field_detail) = {
    help: "Use the default ssid and psk to connect. The default ssid and psk "
          "should be already set on the lab config. The default value is false."
  }];

  optional string wifi_ssid = 2 [(field_detail) = {
    help: "The ssid of wifi will be connected. It will attempt to connect wifi "
          "if wifi_ssid has been set. Need to leave this param empty when "
          "use_default_ssid is true."
  }];

  optional string wifi_psk = 3
      [(field_detail) = { help: "The password of wifi." }];

  optional bool wifi_scan_ssid = 4
      [(field_detail) = { help: "Whether to scan for hidden SSID" }];

  optional int32 wifi_retry_num = 5 [
    default = 3,
    (field_detail) = {
      help: "Nums of retrying to connect to the wifi. Default value is 3. 5 is "
            "max allowed."
    }
  ];

  optional bool wifi_ssid_optional = 6 [
    default = false,
    (field_detail) = {
      help: "Whether the wifi SSID is optional. If true, missing SSID will only"
            " log a warning and skip setup. Default value is false."
    }
  ];
}
