syntax = "proto2";

package mobileharness.shared.spec;

import "src/java/com/google/wireless/qa/mobileharness/shared/proto/spec/base_spec.proto";

option java_package = "com.google.wireless.qa.mobileharness.shared.proto.spec.decorator";
option java_multiple_files = true;
option java_outer_classname = "AndroidEmulatorVideoDecoratorSpecProto";

// Spec for AndroidEmulatorVideoDecorator
message AndroidEmulatorVideoDecoratorSpec {
  extend DecoratorSpec {
    optional AndroidEmulatorVideoDecoratorSpec ext = 1020;
  }

  // FPS value to supply to the emulator screenrecord command
  optional int32 fps = 1 [(field_detail) = {
    help: "FPS to record video at. If not set, will use the decorator default."
  }];

  // Bit rate value to supply to the emulator screenrecord command
  optional int32 bit_rate = 2 [(field_detail) = {
    help: "Bit rate to record video at. If not set, will use the "
          "decorator default."
  }];

  // Time limit to record video. If not supplied use default emulator limit
  // of 15 minutes, following which a additional video files will be recorded.
  optional int32 time_limit_secs = 3 [(field_detail) = {
    help: "Maximum time limit to record video for. If not set, "
          "will use the decorator default."
  }];
}
