syntax = "proto2";

package mobileharness.shared.spec;

import "src/java/com/google/wireless/qa/mobileharness/shared/proto/spec/base_spec.proto";

option java_package = "com.google.wireless.qa.mobileharness.shared.proto.spec.decorator";
option java_multiple_files = true;
option java_outer_classname = "ApkPreconditionCheckDecoratorSpecProto";

// Specs for ApkPreconditionCheckDecorator.
message ApkPreconditionCheckDecoratorSpec {
  extend DecoratorSpec {
    // 1023 is the next available extension number.
    optional ApkPreconditionCheckDecoratorSpec ext = 1023;
  }

  // The APK file name of the precondition check (e.g., "CtsPreconditions.apk").
  optional string apk = 1
      [(field_detail) = { help: "Name of the apk to instrument" }];

  // The package name of the precondition APK (e.g.,
  // "com.android.preconditions.cts").
  optional string package_name = 2
      [(field_detail) = { help: "Name of the package" }];

  // The path to the xTS test directory containing the APK.
  optional string xts_test_dir = 3 [(field_detail) = {
    help: "The xts test dir which contains all test configs."
  }];
}
