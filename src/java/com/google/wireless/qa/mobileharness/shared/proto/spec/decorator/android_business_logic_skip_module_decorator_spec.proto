syntax = "proto2";

package mobileharness.shared.spec;

import "src/java/com/google/wireless/qa/mobileharness/shared/proto/spec/base_spec.proto";

option java_package = "com.google.wireless.qa.mobileharness.shared.proto.spec.decorator";
option java_multiple_files = true;
option java_outer_classname = "AndroidBusinessLogicSkipModuleDecoratorSpecProto";

message AndroidBusinessLogicSkipModuleDecoratorSpec {
  extend DecoratorSpec {
    optional AndroidBusinessLogicSkipModuleDecoratorSpec ext = 1022;
  }

  optional string business_logic_url = 1
      [(field_detail) = { help: "The URL to fetch the business logic." }];

  optional string business_logic_api_key = 2
      [(field_detail) = { help: "The API key for authentication." }];

  optional string business_logic_api_scope = 3
      [(field_detail) = { help: "The scope used for authentication." }];

  optional string config_filename = 4
      [(field_detail) = { help: "Module name mapping to config filename." }];

  optional string xts_suite_info = 5
      [(field_detail) = { help: "The xts suite info for the test." }];

  optional int32 business_logic_timeout_ms = 6 [
    default = 10000,
    (field_detail) = {
      help: "Timeout in milliseconds for business logic request."
    }
  ];
}
