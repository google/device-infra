syntax = "proto3";

package mobileharness.shared.util.comm.dualconduit;

option go_package = "github.com/google/device-infra/src/devtools/mobileharness/shared/util/comm/dualconduit/proto/dconpb;dconpb";
option java_package = "com.google.devtools.mobileharness.shared.util.comm.dualconduit.proto";
option java_outer_classname = "DualConduitProto";

// Low level dual conduit request.
message EstablishConduitRequest {
  enum ConduitType {
    CONDUIT_TYPE_UNSPECIFIED = 0;
    CONDUIT_TYPE_FORWARD = 1;
    CONDUIT_TYPE_REVERSE = 2;
  }
  enum Protocol {
    PROTOCOL_UNSPECIFIED = 0;
    PROTOCOL_TCP = 1;
    PROTOCOL_GRPC = 2;
    PROTOCOL_HTTP = 3;
  }
  ConduitType type = 1;
  // Deprecated. Use the auto_reconnect field in EstablishSessionRequest
  // instead.
  bool auto_reconnect = 2;
  // Server name to identify the server.
  string server_name = 3;
  // The instance ID of the dialer client.
  // This is used to 1) Identify the dialer client and 2) provide hostname in
  // reverse conduit proxy.
  string instance_id = 4;
  Protocol protocol = 5;
  // The destination endpoint of the backend service.
  string destination_endpoint = 6;
  // The local entry port opened on the RQ side. If not set, a random port will
  // be used. You should always specify this field for forward conduits.
  int32 entry_port = 7;
}

message ServiceLocator {
  oneof locator {
    string xds_address = 1;
    string hostname_port = 2;
    string virtual_host = 3;
    string sni = 4;
  }
}

message EstablishConduitResponse {
  string conduit_id = 1;
  // The service locator for the dynamically generated proxy (used if REVERSE).
  // For example, if registered with Envoy, this could be an xds address.
  ServiceLocator service_locator = 2;
}

// Low level dual conduit teardown request.
message TeardownConduitRequest {
  string conduit_id = 1;
}

message TeardownConduitResponse {}

// High level dual conduit session request.
message EstablishSessionRequest {
  EstablishConduitRequest establish_conduit_request = 1;
  // Reverse conduit count is number of conduits at the same time.
  // Only valid for REVERSE type.
  // The default value is 1.
  int32 reverse_conduit_count = 2;
  bool auto_reconnect = 3;
}

message EstablishSessionResponse {
  string session_id = 1;
  // The responses for the initial conduits. The number of responses will be
  // equal to reverse_conduit_count in the request if the request is REVERSE
  // type, otherwise it will be 1.
  repeated EstablishConduitResponse establish_conduit_responses = 2;
}

// High level dual conduit session teardown request.
message TeardownSessionRequest {
  string session_id = 1;
}

message TeardownSessionResponse {}

// Internal envelope wrapper for RSocket metadata passed during setup frame.
message ConduitSetupMetadata {
  EstablishConduitRequest request = 1;
  // Key-value pairs encoding the W3C Trace Context (e.g., "traceparent",
  // "tracestate").
  map<string, string> trace_context = 2;
}
