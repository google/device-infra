syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.device;

import "google/type/date.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.device";
option java_multiple_files = true;
option java_outer_classname = "DeviceStatsProto";

// Represents the data for the Device Healthiness Statistics card.
message HealthinessStats {
  // Time series data for daily healthiness breakdown.
  repeated DailyHealthiness daily_stats = 1;
  // Aggregated data over the selected period.
  HealthinessSummary aggregated_stats = 2;
}

// Healthiness breakdown for a single day.
message DailyHealthiness {
  google.type.Date date = 1;
  HealthinessSummary healthiness_summary = 2;
}

// Healthiness statistics summary over the selected period.
message HealthinessSummary {
  // Total percentage of time the device was considered "In Service".
  float in_service_percent = 1;
  // Total percentage of time the device was considered "Out of Service".
  float out_of_service_percent = 2;

  // Represents a breakdown of a specific healthiness category.
  message Breakdown {
    // TODO: Use an enum for the category.
    // The healthiness category. This is a secondary classification and not a
    // direct mapping to a device status.
    string category = 1;
    float percent = 2;
  }

  // Breakdown of "In Service" time.
  // Expected categories: "IDLE", "BUSY".
  repeated Breakdown in_service_breakdown = 3;

  // Breakdown of "Out of Service" time.
  // Expected categories: "LAMEDUCK", "INIT", "DYING", "DIRTY", "PREPPING",
  // "MISSING", "FAILED", and "OTHERS".
  // The "OTHERS" category is for out-of-service reasons other than device
  // status, like abnormal device type.
  repeated Breakdown out_of_service_breakdown = 4;
}

// --- Common Messages ---
message Stats {
  int32 count = 1;
  float percent = 2;
}

// --- Test Result Statistics ---
enum TestResultCategory {
  TEST_RESULT_CATEGORY_UNSPECIFIED = 0;
  TEST_RESULT_CATEGORY_PASS = 1;
  TEST_RESULT_CATEGORY_FAIL = 2;
  TEST_RESULT_CATEGORY_ERROR = 3;
  TEST_RESULT_CATEGORY_TIMEOUT = 4;
  TEST_RESULT_CATEGORY_ABORT = 5;
  TEST_RESULT_CATEGORY_SKIP = 6;
  TEST_RESULT_CATEGORY_UNKNOWN = 7;
}

message TestResultStats {
  repeated DailyTestResults daily_stats = 1;
  TestResultSummary summary = 2;
}

message DailyTestResults {
  google.type.Date date = 1;
  int32 total_count = 2;

  message DailyCategoryStats {
    TestResultCategory category = 1;
    // 'percent' in Stats is relative to DailyTestResults.total_count
    Stats stats = 2;
  }
  repeated DailyCategoryStats category_stats = 3;
}

message TestResultBreakdownItem {
  TestResultCategory category = 1;
  // 'percent' in Stats is relative to TestResultSummary.total_count
  Stats stats = 2;
}

message TestResultSummary {
  int32 total_count = 1;

  message TestResultGroup {
    string display_name = 1;  // e.g., "Completion", "Non-Completion", "Unknown"
    // 'percent' in total_stats is relative to TestResultSummary.total_count
    Stats total_stats = 2;  // Total count and percent for this group
    repeated TestResultBreakdownItem breakdown_items =
        3;  // Breakdown of individual categories within this group
  }

  TestResultGroup completion_group = 2;
  TestResultGroup non_completion_group = 3;
  TestResultGroup unknown_group = 4;
}

// --- Recovery Task Statistics ---

enum RecoveryOutcomeCategory {
  RECOVERY_OUTCOME_CATEGORY_UNSPECIFIED = 0;
  RECOVERY_OUTCOME_CATEGORY_SUCCESS = 1;
  RECOVERY_OUTCOME_CATEGORY_FAIL = 2;
}

message RecoveryTaskStats {
  repeated DailyRecoveryTasks daily_stats = 1;
  RecoveryTaskSummary summary = 2;
}

message DailyRecoveryTasks {
  google.type.Date date = 1;
  int32 total_count = 2;

  message DailyOutcomeStats {
    RecoveryOutcomeCategory category = 1;
    // 'percent' in Stats is relative to DailyRecoveryTasks.total_count
    Stats stats = 2;
  }
  repeated DailyOutcomeStats category_stats = 3;
}

message RecoveryTaskBreakdownItem {
  RecoveryOutcomeCategory category = 1;
  // 'percent' in Stats is relative to RecoveryTaskSummary.total_count
  Stats stats = 2;
}

message RecoveryTaskSummary {
  int32 total_count = 1;
  repeated RecoveryTaskBreakdownItem outcome_breakdown = 2;
}
