syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.session;

import "src/devtools/mobileharness/fe/v6/service/proto/session/session_resources.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.session";
option java_multiple_files = true;
option java_outer_classname = "SessionServiceProto";

service SessionService {
  // Gets the detailed information of a session by its ID.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {}

  // Gets the log chunk of a session by its ID, supporting pagination/offset.
  rpc GetSessionLog(GetSessionLogRequest) returns (GetSessionLogResponse) {}
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  SessionDetail session = 1;
}

message GetSessionLogRequest {
  string session_id = 1;

  // The starting byte offset to read from.
  int64 offset = 2;

  // The maximum number of bytes to read.
  int32 length = 3;
}

message GetSessionLogResponse {
  // The retrieved log content chunk.
  string log_content = 1;

  // The offset to be used for the next read request.
  int64 next_offset = 2;

  // Whether there are more log contents to be read.
  bool has_more = 3;
}
