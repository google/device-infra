syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.session;

import "google/protobuf/timestamp.proto";
import "src/devtools/mobileharness/fe/v6/service/proto/common/common_resources.proto";
import "src/devtools/mobileharness/fe/v6/service/proto/job/job_resources.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.session";
option java_multiple_files = true;
option java_outer_classname = "SessionResourcesProto";

// ---------- List item types ----------

// One non-fatal warning surfaced during session execution.
message SessionWarning {
  // Short summary shown when collapsed (e.g. the first line).
  string message = 1;
  // Full detail shown when expanded.
  string trace = 2;
}

// One error that contributed to a non-passing session result.
message SessionError {
  // Short summary shown when collapsed (e.g. the first line).
  string message = 1;
  // Full detail, including the complete stack trace.
  string trace = 2;
}

// ---------- List wrapper types ----------
// Each list lives in its own message (a single repeated field) so SessionDetail
// stays flat and every list can be extended independently.

message SessionWarnings {
  repeated SessionWarning warning = 1;
}

message SessionErrors {
  repeated SessionError error = 1;
}

// ---------- Reference / grouping types ----------

// Execution details mapped to the "Execution Details" UI card.
message SessionExecutionDetails {
  string user = 1;
  string client = 2;
  string version = 3;
  string executor = 4;
  repeated string labels = 5;
  string sponge_link = 6;
  google.protobuf.Timestamp create_time = 7;
  google.protobuf.Timestamp start_time = 8;
  google.protobuf.Timestamp end_time = 9;
}

// Troubleshooting details (warnings & errors) mapped to the troubleshooting
// card.
message SessionTroubleshooting {
  SessionWarnings warnings = 1;
  SessionErrors result_cause = 2;
}

// ---------- Top-level ----------

message SessionDetail {
  string id = 1;
  string title = 2;
  .devtools.mobileharness.fe.v6.service.proto.common.SessionStatus status = 3;
  .devtools.mobileharness.fe.v6.service.proto.common.SessionResult result = 4;

  // Execution details card.
  SessionExecutionDetails execution_details = 5;

  // Properties.
  map<string, string> properties = 6;

  // Child jobs.
  .devtools.mobileharness.fe.v6.service.proto.job.JobSummaries jobs = 7;

  // Troubleshooting card (warnings & errors).
  SessionTroubleshooting troubleshooting = 8;
}
