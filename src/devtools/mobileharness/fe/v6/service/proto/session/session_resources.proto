syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.session;

import "google/protobuf/timestamp.proto";
import "src/devtools/mobileharness/fe/v6/service/proto/job/job_resources.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.session";
option java_multiple_files = true;
option java_outer_classname = "SessionResourcesProto";

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_NEW = 1;
  SESSION_STATUS_RUNNING = 2;
  SESSION_STATUS_DONE = 3;
}

enum SessionResult {
  SESSION_RESULT_UNSPECIFIED = 0;
  SESSION_RESULT_PASS = 1;
  SESSION_RESULT_FAIL = 2;
  SESSION_RESULT_ERROR = 3;
  SESSION_RESULT_TIMEOUT = 4;
  SESSION_RESULT_ABORT = 5;
  SESSION_RESULT_SKIP = 6;
}

message SessionError {
  string message = 1;
  string trace = 2;
}

message SessionDetail {
  string id = 1;
  string title = 2;
  SessionStatus status = 3;
  SessionResult result = 4;
  string user = 5;
  string client = 6;
  string version = 7;
  string executor = 8;
  repeated string labels = 9;
  string sponge_link = 10;

  google.protobuf.Timestamp create_time = 11;
  google.protobuf.Timestamp start_time = 12;
  google.protobuf.Timestamp end_time = 13;

  map<string, string> properties = 14;
  repeated .devtools.mobileharness.fe.v6.service.proto.job.JobSummary jobs = 15;
  SessionError error = 17;
}
