syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.test;

import "google/protobuf/timestamp.proto";
import "src/devtools/mobileharness/fe/v6/service/proto/common/common_resources.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.test";
option java_multiple_files = true;
option java_outer_classname = "TestResourcesProto";

// ---------- List item types ----------
// Each list item is its own message (never a bare repeated scalar) so per-item
// fields stay extensible.

// One device the test was executed on.
message TestDevice {
  string id = 1;
  string type = 2;
}

// One non-fatal warning surfaced during execution (does NOT fail the test).
message TestWarning {
  // Short summary shown when collapsed (e.g. the first line).
  string message = 1;
  // Full detail shown when expanded.
  string trace = 2;
}

// One error that contributed to a non-passing test result.
message TestError {
  // Short summary shown when collapsed (e.g. the first line).
  string message = 1;
  // Full detail, including the complete stack trace.
  string trace = 2;
}

// A lightweight summary of a test. Used as a list row in two contexts:
//  - TestDetail.sub_tests: nested sub-tests within a parent test.
//  - JobDetail.tests (in job_resources.proto): the child tests of a job.
message TestSummary {
  string id = 1;
  string name = 2;
  .devtools.mobileharness.fe.v6.service.proto.common.TestStatus status = 3;
  .devtools.mobileharness.fe.v6.service.proto.common.TestResult result = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
  TestDevices devices = 7;
}

// ---------- List wrapper types ----------
// Each list lives in its own message (a single repeated field) so TestDetail
// stays flat and every list can be extended independently.

message TestDevices {
  repeated TestDevice device = 1;
}

message TestWarnings {
  repeated TestWarning warning = 1;
}

message TestErrors {
  repeated TestError error = 1;
}

message TestSummaries {
  // Wrapper for a list of test summaries, used by both TestDetail.sub_tests
  // and JobDetail.tests.
  repeated TestSummary test = 1;
}

// ---------- Reference / grouping types ----------

// Minimal reference to the parent job, holding only what the test-detail "job
// hover" needs. Deliberately not job.JobSummary: test_resources.proto cannot
// import job_resources.proto because job already imports test, which would
// create a proto dependency cycle.
message ParentJobInfo {
  string id = 1;
  string name = 2;
  string sponge_link = 3;
  .devtools.mobileharness.fe.v6.service.proto.common.JobStatus status = 4;
  .devtools.mobileharness.fe.v6.service.proto.common.JobResult result = 5;
}

// The host the test ran on.
message HostInfo {
  string name = 1;
  string ip = 2;
  string universe = 3;
}

// Execution details mapped to the "Execution Details" UI card.
message ExecutionDetails {
  string user = 1;
  string actual_user = 2;
  string cloud_log_link = 3;
  google.protobuf.Timestamp create_time = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
  google.protobuf.Timestamp last_update_time = 7;
}

// Configuration details mapped to the configuration section.
message TestConfig {
  map<string, string> params = 1;
  map<string, string> dimensions = 2;
}

// Troubleshooting details (warnings & errors) mapped to the troubleshooting
// card.
message Troubleshooting {
  TestWarnings warnings = 1;
  TestErrors result_cause = 2;
}

// Nested sub-tests list details.
message SubTestsInfo {
  // Sub / nested tests. When a sub-test's full detail is requested (via
  // GetTestRequest.sub_test_id), root_test_id is set to the root test's ID so
  // the UI can render the full sub-test tree.
  // TODO: b/529253317 - Implement sub-test detail support.
  string root_test_id = 1;
  TestSummaries sub_tests = 2;
}

// ---------- Top-level ----------

message TestDetail {
  string id = 1;
  string name = 2;
  .devtools.mobileharness.fe.v6.service.proto.common.TestStatus status = 3;
  .devtools.mobileharness.fe.v6.service.proto.common.TestResult result = 4;

  // Parent job (minimal reference, for the hover card).
  ParentJobInfo job = 5;

  // Executed on.
  TestDevices devices = 6;
  HostInfo host = 7;

  // Execution details card.
  ExecutionDetails execution_details = 8;

  // Configuration.
  TestConfig config = 9;

  // Properties.
  map<string, string> properties = 10;

  // Troubleshooting card (warnings & errors).
  Troubleshooting troubleshooting = 11;

  // Sub / nested tests info.
  SubTestsInfo sub_tests_info = 12;

  // Detailed execution phase timelines for Gantt rendering.
  .devtools.mobileharness.fe.v6.service.proto.common.TimeBreakdown
      timing_breakdown = 13;
}
