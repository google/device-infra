syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.test;

import "google/protobuf/timestamp.proto";
import "src/devtools/mobileharness/api/model/proto/test.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.test";
option java_multiple_files = true;
option java_outer_classname = "TestResourcesProto";

message TestError {
  string message = 1;
  string trace = 2;
}

message TestSummary {
  string id = 1;
  string name = 2;
  .mobileharness.api.model.TestStatus status = 3;
  .mobileharness.api.model.TestResult result = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
}

message TestDetail {
  string id = 1;
  string name = 2;
  .mobileharness.api.model.TestStatus status = 3;
  .mobileharness.api.model.TestResult result = 4;

  // Parent Job Info
  string job_id = 5;
  string job_name = 6;

  // Executed On
  string device_id = 7;
  string device_type = 8;

  // Execution Details
  string sponge_link = 9;
  google.protobuf.Timestamp create_time = 10;
  google.protobuf.Timestamp start_time = 11;
  google.protobuf.Timestamp end_time = 12;

  // Configuration
  map<string, string> params = 13;
  map<string, string> dimensions = 14;

  // Properties
  map<string, string> properties = 15;

  // Troubleshooting
  repeated string warnings = 17;
  TestError error = 18;
}
