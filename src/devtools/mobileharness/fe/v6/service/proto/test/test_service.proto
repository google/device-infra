syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.test;

import "google/api/annotations.proto";
import "src/devtools/mobileharness/fe/v6/service/proto/test/test_resources.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.test";
option java_multiple_files = true;
option java_outer_classname = "TestServiceProto";

service TestService {
  // Gets the detailed information of a test by its ID.
  //
  // Uses POST (not GET) because the request carries fields in the body
  // (`body: "*"`, e.g. job_id); an HTTP GET cannot carry a request body.
  rpc GetTest(GetTestRequest) returns (GetTestResponse) {
    option (google.api.http) = {
      post: "/v6/tests/{test_id}:getTest"
      body: "*"
    };
  }

  // Gets the log of a test by its ID, returning the log from `offset` to the
  // end.
  //
  // Uses POST (not GET) for the same reason as GetTest: the request carries
  // fields in the body (`body: "*"`, e.g. job_id/offset); an HTTP GET cannot
  // carry a request body.
  rpc GetTestLog(GetTestLogRequest) returns (GetTestLogResponse) {
    option (google.api.http) = {
      post: "/v6/tests/{test_id}:getTestLog"
      body: "*"
    };
  }
}

message GetTestRequest {
  // The ID of the root test.
  string test_id = 1;

  // Optional. If set, the backend fetches the root test, walks the sub-test
  // tree to find this sub-test, and returns its full TestDetail (with
  // root_test_id set to test_id). This mirrors FE v5's ?sub_test= param.
  // TODO: b/529253317 - Implement sub-test detail support in the backend.
  string sub_test_id = 2;

  // The ID of the parent job. The backend requires both job_id and test_id
  // to fetch test details. The frontend has this from the navigation context
  // (the Test Detail page URL includes the job ID).
  string job_id = 3;
}

message GetTestResponse {
  TestDetail test = 1;
}

message GetTestLogRequest {
  string test_id = 1;

  // The starting byte offset to read from.
  int64 offset = 2;

  // Currently IGNORED by the server: GetTestLog returns the log from `offset`
  // to the end in a single response (MOSS provides no server-side log slicing).
  // Kept for wire compatibility and possible future use; clients may still set
  // it, but it has no effect today.
  int32 length = 3;

  // The ID of the parent job.
  string job_id = 4;
}

message GetTestLogResponse {
  // The retrieved log content, from the request `offset` to the end of the log.
  string log_content = 1;

  // The end offset of `log_content` (i.e. the current log length). A client
  // tailing a live/RUNNING test passes this back as `offset` on its next poll
  // to fetch only newly-appended content.
  int64 next_offset = 2;

  // Currently always false: GetTestLog returns the log through the current end
  // in a single response, so there is never a further chunk to fetch for the
  // same snapshot. Kept for wire compatibility and possible future use.
  bool has_more = 3;
}
