syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.test;

import "src/devtools/mobileharness/fe/v6/service/proto/test/test_resources.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.test";
option java_multiple_files = true;
option java_outer_classname = "TestServiceProto";

service TestService {
  // Gets the detailed information of a test by its ID.
  rpc GetTest(GetTestRequest) returns (GetTestResponse) {}

  // Gets the log chunk of a test by its ID, supporting pagination/offset.
  rpc GetTestLog(GetTestLogRequest) returns (GetTestLogResponse) {}
}

message GetTestRequest {
  // The ID of the root test.
  string test_id = 1;

  // Optional. If set, the backend fetches the root test, walks the sub-test
  // tree to find this sub-test, and returns its full TestDetail (with
  // root_test_id set to test_id). This mirrors FE v5's ?sub_test= param.
  // TODO: b/529253317 - Implement sub-test detail support in the backend.
  string sub_test_id = 2;

  // The ID of the parent job. The backend requires both job_id and test_id
  // to fetch test details. The frontend has this from the navigation context
  // (the Test Detail page URL includes the job ID).
  string job_id = 3;
}

message GetTestResponse {
  TestDetail test = 1;
}

message GetTestLogRequest {
  string test_id = 1;

  // The starting byte offset to read from.
  int64 offset = 2;

  // The maximum number of bytes to read.
  int32 length = 3;

  // The ID of the parent job.
  string job_id = 4;
}

message GetTestLogResponse {
  // The retrieved log content chunk.
  string log_content = 1;

  // The offset to be used for the next read request.
  int64 next_offset = 2;

  // Whether there are more log contents to be read.
  bool has_more = 3;
}
