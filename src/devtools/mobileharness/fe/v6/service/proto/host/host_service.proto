syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.host;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "src/devtools/mobileharness/fe/v6/service/proto/host/host_resources.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.host";
option java_multiple_files = true;
option java_outer_classname = "HostServiceProto";

// Service definition for host-related operations.
service HostService {
  // Retrieves basic information for host header and action bar.
  rpc GetHostHeaderInfo(GetHostHeaderInfoRequest) returns (HostHeaderInfo) {
    option (google.api.http) = {
      get: "/v6/hosts/{host_name}/header-info"
    };
  }

  // Retrieves the detailed overview data for a specific host by its name.
  rpc GetHostOverview(GetHostOverviewRequest) returns (HostOverviewPageData) {
    option (google.api.http) = {
      get: "/v6/hosts/{host_name}/overview"
    };
  }

  // Retrieves device summaries for a specific host.
  rpc GetHostDeviceSummaries(GetHostDeviceSummariesRequest)
      returns (GetHostDeviceSummariesResponse) {
    option (google.api.http) = {
      get: "/v6/hosts/{host_name}/devices",
    };
  }

  // Retrieves diagnostic information from the host.
  rpc GetHostDebugInfo(GetHostDebugInfoRequest)
      returns (GetHostDebugInfoResponse) {
    option (google.api.http) = {
      get: "/v6/hosts/{host_name}/debug-info"
    };
  }

  // Retrieves popular pass-through flags for a host.
  rpc GetPopularFlags(GetPopularFlagsRequest)
      returns (GetPopularFlagsResponse) {
    option (google.api.http) = {
      get: "/v6/hosts/{host_name}/popular-flags"
    };
  }

  // Updates the pass through flags for a specific host.
  rpc UpdatePassThroughFlags(UpdatePassThroughFlagsRequest)
      returns (UpdatePassThroughFlagsResponse) {
    option (google.api.http) = {
      post: "/v6/hosts/{host_name}/updatePassThroughFlags"
      body: "*"
    };
  }

  // Retrieves release configurations for a host.
  rpc PreflightLabServerRelease(PreflightLabServerReleaseRequest)
      returns (PreflightLabServerReleaseResponse) {
    option (google.api.http) = {
      get: "/v6/hosts/{host_name}/preflightLabServerRelease"
    };
  }

  // Decommissions missing devices on a specific host.
  rpc DecommissionMissingDevices(DecommissionMissingDevicesRequest)
      returns (DecommissionMissingDevicesResponse) {
    option (google.api.http) = {
      post: "/v6/hosts/{host_name}/decommissionMissingDevices"
      body: "*"
    };
  }

  // Checks for remote control eligibility for the given devices on the host.
  rpc CheckRemoteControlEligibility(CheckRemoteControlEligibilityRequest)
      returns (CheckRemoteControlEligibilityResponse) {
    option (google.api.http) = {
      post: "/v6/hosts/{host_name}/checkRemoteControlEligibility"
      body: "*"
    };
  }

  // Starts remote control sessions for multiple devices.
  rpc RemoteControlDevices(RemoteControlDevicesRequest)
      returns (RemoteControlDevicesResponse) {
    option (google.api.http) = {
      post: "/v6/hosts/{host_name}/remoteControlDevices"
      body: "*"
    };
  }

  // Decommissions a missing host and all its associated devices.
  rpc DecommissionHost(DecommissionHostRequest)
      returns (DecommissionHostResponse) {
    option (google.api.http) = {
      post: "/v6/hosts/{host_name}:decommission"
      body: "*"
    };
  }

  // Deploys a specific Lab Server release version to a host.
  rpc ReleaseLabServer(ReleaseLabServerRequest)
      returns (ReleaseLabServerResponse) {
    option (google.api.http) = {
      post: "/v6/hosts/{host_name}:deploy"
      body: "*"
    };
  }

  // Starts the lab server process on the host with same release version and
  // latest flags.
  rpc StartLabServer(StartLabServerRequest) returns (StartLabServerResponse) {
    option (google.api.http) = {
      post: "/v6/hosts/{host_name}:start"
      body: "*"
    };
  }

  // Restarts the lab server process on the host with same release version and
  // latest flags.
  rpc RestartLabServer(RestartLabServerRequest)
      returns (RestartLabServerResponse) {
    option (google.api.http) = {
      post: "/v6/hosts/{host_name}:restart"
      body: "*"
    };
  }

  // Stops the lab server process on the host.
  rpc StopLabServer(StopLabServerRequest) returns (StopLabServerResponse) {
    option (google.api.http) = {
      post: "/v6/hosts/{host_name}:stop"
      body: "*"
    };
  }
}

// Request message for GetHostHeaderInfo.
message GetHostHeaderInfoRequest {
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Request message for GetHostOverview.
message GetHostOverviewRequest {
  // The unique name of the host.
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Request message for GetHostDeviceSummaries.
message GetHostDeviceSummariesRequest {
  // The unique name of the host.
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Response message for GetHostDeviceSummaries.
message GetHostDeviceSummariesResponse {
  // The list of device summaries.
  repeated DeviceSummary device_summaries = 1;
}

// Request message for GetHostDebugInfo.
message GetHostDebugInfoRequest {
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Result of diagnostic command collection.
message GetHostDebugInfoResponse {
  repeated CommandResult results = 1;
  google.protobuf.Timestamp timestamp = 2;
}

// Request message for GetPopularFlags.
message GetPopularFlagsRequest {
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Response message for GetPopularFlags.
message GetPopularFlagsResponse {
  repeated PopularFlag flags = 1;
}

// Request message for UpdatePassThroughFlags.
message UpdatePassThroughFlagsRequest {
  // The unique name of the host.
  string host_name = 1;
  // The new pass through flags.
  string flags = 2;

  // The universe of the host.
  string universe = 3;
}

// Response message for UpdatePassThroughFlags.
message UpdatePassThroughFlagsResponse {}

// Request message for PreflightLabServerRelease.
message PreflightLabServerReleaseRequest {
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Response message for PreflightLabServerRelease.
message PreflightLabServerReleaseResponse {
  // No deploy permission.
  message PermissionDenied {}

  // All checks passed. Here are the available versions to deploy.
  message ReleaseReady {
    repeated DeployableVersion versions = 1;
  }

  oneof result {
    PermissionDenied permission_denied = 1;
    ReleaseReady ready = 2;
  }
}

// Request message for DecommissionMissingDevices.
message DecommissionMissingDevicesRequest {
  // The unique name of the host.
  string host_name = 1;
  // The list of device IDs to decommission.
  repeated string device_ids = 2;

  // The universe of the host.
  string universe = 3;
}

// Response message for DecommissionMissingDevices.
message DecommissionMissingDevicesResponse {}

// Request message for CheckRemoteControlEligibility.
message CheckRemoteControlEligibilityRequest {
  // The unique name of the host.
  string host_name = 1;

  // Represents a device to check for eligibility.
  message DeviceTarget {
    // The unique identifier of the device. If sub_device_id is provided,
    // this should be parent device id.
    string device_id = 1;
    // Optional. The unique identifier of the sub-device when targeting a
    // specific sub-device.
    string sub_device_id = 2;
  }

  // The list of device targets to check.
  repeated DeviceTarget targets = 3;

  // The universe of the host.
  string universe = 4;
}

// Response for remote control eligibility check.
message CheckRemoteControlEligibilityResponse {
  // The overall verdict dictating the frontend flow.
  EligibilityStatus status = 1;
  // Consolidated list of results for ALL requested devices.
  // Always populated.
  repeated DeviceEligibilityResult results = 2;
  // Session options derived from the intersection of all ELIGIBLE devices.
  // Present only if status is 'READY'.
  SessionOptions session_options = 3;
}

// Request to start remote control sessions for multiple devices.
message RemoteControlDevicesRequest {
  string host_name = 1;
  repeated RemoteControlDeviceConfig device_configs = 2;
  int32 duration_seconds = 3;
  DeviceProxyType proxy_type = 4;
  string video_resolution = 5;
  string max_video_size = 6;
  FlashOptions flash_options = 7;

  // The universe of the host.
  string universe = 8;
}

// Response containing results of remote control session startup.
message RemoteControlDevicesResponse {
  message SessionResult {
    string device_id = 1;
    string session_url = 2;
    string error_message = 3;
  }
  repeated SessionResult sessions = 1;
}

// Request message for DecommissionHost.
message DecommissionHostRequest {
  // The unique name of the host.
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Response message for DecommissionHost.
message DecommissionHostResponse {}

// Request message for ReleaseLabServer.
message ReleaseLabServerRequest {
  string host_name = 1;
  string version = 2;
  string flags = 3;

  // The universe of the host.
  string universe = 4;
}

// Request message for StartLabServer.
message StartLabServerRequest {
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Request message for StopLabServer.
message StopLabServerRequest {
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Request message for RestartLabServer.
message RestartLabServerRequest {
  string host_name = 1;

  // The universe of the host.
  string universe = 2;
}

// Response for ReleaseLabServer API.
message ReleaseLabServerResponse {
  // The tracking URL for the rollout.
  string tracking_url = 1;
}

// Response for StartLabServer API.
message StartLabServerResponse {
  // The tracking URL for the rollout.
  string tracking_url = 1;
}

// Response for RestartLabServer API.
message RestartLabServerResponse {
  // The tracking URL for the rollout.
  string tracking_url = 1;
}

// Response for StopLabServer API.
message StopLabServerResponse {
  // The tracking URL for the rollout.
  string tracking_url = 1;
}
