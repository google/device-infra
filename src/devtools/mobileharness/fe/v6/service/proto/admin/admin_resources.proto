syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.admin;

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.admin";
option java_multiple_files = true;
option java_outer_classname = "AdminResourcesProto";

// A single Wi-Fi credential entry.
// When stored, the file is transparently encrypted at rest, so no
// application-layer encryption (Keystore wrap/unwrap) is needed.
message WifiCredentialEntry {
  // The network name (SSID).
  string ssid = 1;
  // The password (PSK) for the network.
  string psk = 2;
}

// Container for Wi-Fi credentials stored on CNS.
// This proto is written as a binary proto file to encrypted storage,
// providing encryption at rest without application-layer key management.
message WifiCredentialStore {
  // The list of Wi-Fi credentials.
  repeated WifiCredentialEntry entries = 1;
}
