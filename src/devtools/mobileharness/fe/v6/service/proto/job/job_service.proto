syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.job;

import "src/devtools/mobileharness/fe/v6/service/proto/job/job_resources.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.job";
option java_multiple_files = true;
option java_outer_classname = "JobServiceProto";

service JobService {
  // Retrieves the detailed Job overview by its ID.
  rpc GetJob(GetJobRequest) returns (GetJobResponse) {}

  // Streams or paginates log chunks of a running/completed Job.
  rpc GetJobLog(GetJobLogRequest) returns (GetJobLogResponse) {}

  // Retrieves the content of a specific file associated with a Job.
  rpc GetJobFile(GetJobFileRequest) returns (GetJobFileResponse) {}
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  JobDetail job = 1;
  JobActions actions = 2;
}

message GetJobLogRequest {
  string job_id = 1;

  // The starting byte offset to read from.
  int64 offset = 2;

  // The maximum number of bytes to read.
  int32 length = 3;
}

message GetJobLogResponse {
  // The retrieved log content chunk.
  string log_content = 1;

  // The offset to be used for the next read request.
  int64 next_offset = 2;

  // Whether there are more log contents to be read.
  bool has_more = 3;
}

message GetJobFileRequest {
  string job_id = 1;
  string file_path = 2;
}

message GetJobFileResponse {
  string content = 1;
}
