syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.job;

import "src/devtools/mobileharness/fe/v6/service/proto/common/common_resources.proto";
import "src/devtools/mobileharness/fe/v6/service/proto/test/test_resources.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.job";
option java_multiple_files = true;
option java_outer_classname = "JobResourcesProto";

// ---------- List item types ----------

// One device allocation requirement defined by the job.
message DeviceRequirement {
  string device_type = 1;
  string driver = 2;
  repeated string decorators = 3;
  map<string, string> dimensions = 4;
}

// ---------- List wrapper types ----------

message DeviceRequirements {
  repeated DeviceRequirement device = 1;
}

// ---------- Reference / grouping types ----------

// Reference link back to the parent session.
message ParentSessionInfo {
  string id = 1;
  string name = 2;
  .devtools.mobileharness.fe.v6.service.proto.common.SessionStatus status = 3;
  .devtools.mobileharness.fe.v6.service.proto.common.SessionResult result = 4;
}

// Concrete execution settings parameter mapping.
message Settings {
  int32 total_test_count = 1;
  string priority = 2;
  int32 job_timeout_sec = 3;
  int32 test_timeout_sec = 4;
  int32 start_timeout_sec = 5;
  int32 test_attempts = 6;
  bool force_retry = 7;
  string retry_level = 8;
}

// Representation of Job configuration settings.
message JobConfig {
  DeviceRequirements devices = 1;
  Settings settings = 2;
  map<string, string> params = 3;
}

// Information about a file associated with the job.
message JobFile {
  string path = 1;
  int64 size = 2;
  string type = 3;
}

// File explorer resources.
message FileExplorer {
  string cns_path = 1;
  repeated JobFile files = 2;
}

// Representation of Job operations / actions.
message JobActions {
  .devtools.mobileharness.fe.v6.service.proto.common.ActionButtonState kill = 1;
}

// ---------- Top-level Layout Message ----------

message JobDetail {
  string id = 1;
  string name = 2;
  .devtools.mobileharness.fe.v6.service.proto.common.JobStatus status = 3;
  .devtools.mobileharness.fe.v6.service.proto.common.JobResult result = 4;

  // Top-level Job metrics link.
  string sponge_link = 5;

  // Parent Session reference info.
  ParentSessionInfo session = 6;

  // Children test summaries. Reuses TestSummaries from test_resources.proto.
  .devtools.mobileharness.fe.v6.service.proto.test.TestSummaries tests = 7;

  // Execution card metrics (shared).
  .devtools.mobileharness.fe.v6.service.proto.common.ExecutionDetails
      execution_details = 8;

  // Configurations map details.
  JobConfig config = 9;

  // Properties.
  map<string, string> properties = 10;

  // Troubleshooting card (warnings & errors) (shared).
  .devtools.mobileharness.fe.v6.service.proto.common.Troubleshooting
      troubleshooting = 11;

  // Detailed timing breakdown.
  .devtools.mobileharness.fe.v6.service.proto.common.TimeBreakdown
      timing_breakdown = 12;

  // Files explorer resources.
  FileExplorer file_explorer = 13;
}
