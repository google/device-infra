syntax = "proto3";

package devtools.mobileharness.fe.v6.service.proto.common;

import "google/protobuf/timestamp.proto";

option java_package = "com.google.devtools.mobileharness.fe.v6.service.proto.common";
option java_multiple_files = true;
option java_outer_classname = "CommonResourcesProto";

// Status and result enums shared across the v6 test/job/session protos.
//
// These follow "gRPC-friendly" enum conventions, which matter because gRPC
// uses proto3, where enum fields have no presence: an unset field is silently
// read as the zero value. The conventions below keep that safe and composable:
//
//  1. Each enum reserves 0 as an explicit `*_UNSPECIFIED` sentinel. Because an
//     unpopulated field decodes to 0, that 0 must mean "not set / unknown" and
//     never a real state. (Contrast the legacy api.model enums, where e.g.
//     TestStatus NEW = 0 makes "unset" indistinguishable from "genuinely new".)
//
//  2. Every value name is prefixed with the enum name (TEST_RESULT_PASS, not
//     PASS). Proto enum value names are scoped to the enclosing file, not the
//     enum, so unprefixed names would collide. The prefixes are exactly what
//     let all six enums live together in this one common file.
//
//  3. Status (lifecycle) and Result (outcome) are kept as separate enums, so a
//     RUNNING item simply has an UNSPECIFIED result until it finishes instead
//     of needing a fake "in progress" result value.
//
//  4. They are FE-owned (not reused from the internal execution-layer
//     api.model protos), so this public gRPC contract stays decoupled from
//     internal proto churn and build dependencies.

// gRPC-friendly status of a test, decoupled from its result.
enum TestStatus {
  TEST_STATUS_UNSPECIFIED = 0;
  TEST_STATUS_NEW = 1;
  TEST_STATUS_ASSIGNED = 2;
  TEST_STATUS_RUNNING = 3;
  TEST_STATUS_DONE = 4;
  TEST_STATUS_SUSPENDED = 5;
}

// gRPC-friendly result of a test.
enum TestResult {
  TEST_RESULT_UNSPECIFIED = 0;
  TEST_RESULT_PASS = 1;
  TEST_RESULT_FAIL = 2;
  TEST_RESULT_ERROR = 3;
  TEST_RESULT_TIMEOUT = 4;
  TEST_RESULT_ABORT = 5;
  TEST_RESULT_SKIP = 6;
}

// gRPC-friendly status of a job, decoupled from its result.
enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_NEW = 1;
  JOB_STATUS_RUNNING = 2;
  JOB_STATUS_DONE = 3;
  JOB_STATUS_SUSPENDED = 4;
  JOB_STATUS_ASSIGNED = 5;
}

// gRPC-friendly result of a job.
enum JobResult {
  JOB_RESULT_UNSPECIFIED = 0;
  JOB_RESULT_PASS = 1;
  JOB_RESULT_FAIL = 2;
  JOB_RESULT_ERROR = 3;
  JOB_RESULT_TIMEOUT = 4;
  JOB_RESULT_ABORT = 5;
  JOB_RESULT_SKIP = 6;
}

// gRPC-friendly status of a session, decoupled from its result.
enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_NEW = 1;
  SESSION_STATUS_RUNNING = 2;
  SESSION_STATUS_DONE = 3;
}

// gRPC-friendly result of a session.
enum SessionResult {
  SESSION_RESULT_UNSPECIFIED = 0;
  SESSION_RESULT_PASS = 1;
  SESSION_RESULT_FAIL = 2;
  SESSION_RESULT_ERROR = 3;
  SESSION_RESULT_TIMEOUT = 4;
  SESSION_RESULT_ABORT = 5;
  SESSION_RESULT_SKIP = 6;
}

// Information about user and group permissions.
message PermissionInfo {
  // List of users/groups who own the resource.
  repeated string owners = 1;
  // List of users/groups who can execute actions on the resource.
  repeated string executors = 2;
}

// Represents one dimension of a resource (e.g., device, host).
message DeviceDimension {
  string name = 1;
  string value = 2;
}

// State of an action button.
message ActionButtonState {
  bool enabled = 1;
  bool visible = 2;
  string tooltip = 3;
  bool is_ready = 4;
}

// Detailed timing breakdown for Gantt chart / timeline rendering.
message TimeBreakdown {
  // TODO: Define the fields when implementing the timeline
  // breakdown feature.
}

// Representing a single error with its trace.
message ErrorInfo {
  string message = 1;
  string trace = 2;
}

// Representing a single warning trace log.
message WarningInfo {
  string message = 1;
  string trace = 2;
}

message Errors {
  repeated ErrorInfo error = 1;
}

message Warnings {
  repeated WarningInfo warning = 1;
}

// Troubleshooting details (warnings & errors).
message Troubleshooting {
  Warnings warnings = 1;
  Errors result_cause = 2;
}

// Shared execution details.
message ExecutionDetails {
  string user = 1;
  string actual_user = 2;
  string cloud_log_link = 3;

  google.protobuf.Timestamp create_time = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
  google.protobuf.Timestamp update_time = 7;
}
