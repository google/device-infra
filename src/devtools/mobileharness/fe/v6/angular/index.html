<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OmniLab Console</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .initial-loading-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: Roboto, "Helvetica Neue", sans-serif;
      }
      .initial-loading-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .initial-loading-text {
        margin-top: 20px;
        font-size: 18px;
        color: #555;
      }
    </style>

    <!-- Needed for Material icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" media="print" onload="this.media='all'" />

    <!-- Material Theme CSS -->
    <link rel="stylesheet" href="material-theme.css" media="print" onload="this.media='all'" />

    <!-- Global styles -->
    <link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'" />
  </head>
  <body>
    <div id="initial-loading-overlay" class="initial-loading-container">
      <div class="initial-loading-spinner"></div>
      <div class="initial-loading-text">Loading OmniLab Console...</div>
    </div>
    <app-root></app-root>
  </body>
</html>
