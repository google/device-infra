<app-dialog
  title="Screenshot"
  width="60rem"
  height="80vh"
  footerType="normal"
>
  <div subtitle class="dialog-subtitle-container">
    Device: {{ data.deviceId }} | Captured at <app-datetime-trigger [timestamp]="data.capturedAt"></app-datetime-trigger>
  </div>
  <div class="screenshot-content">
    <div
      id="screenshot-image-container"
      class="image-container"
      (click)="toggleZoom($event)"
    >
      <img
        id="screenshot-image"
        [src]="data.screenshotUrl"
        alt="Device screenshot"
        class="screenshot-image"
      />
    </div>
  </div>
  <ng-template #actionsTemplate>
    <button class="dialog-button dialog-button-secondary" (click)="viewInNewTab()">
      <mat-icon>open_in_new</mat-icon>
      View in new tab
    </button>
    <!-- TODO: show this button when the download proxy in BE is ready.
     Because let the browser to fetch that download URL directly will be blocked by CORS,
     we need to use an intermediate server(the BE) (i.e. download proxy) to fetch the image for us. -->
    <button
      class="dialog-button dialog-button-secondary"
      style="display: none;"
      (click)="downloadImage()"
      [disabled]="isDownloading()"
    >
      @if (isDownloading()) {
        <mat-progress-spinner mode="indeterminate" diameter="16"></mat-progress-spinner>
      } @else {
        <mat-icon>download</mat-icon>
      }
      Download
    </button>
    <button mat-dialog-close class="dialog-button dialog-button-primary">Close</button>
  </ng-template>
</app-dialog>
