syntax = "proto3";

package mobileharness.infra.ats.common;

option java_package = "com.google.devtools.mobileharness.infra.ats.common.proto";
option java_outer_classname = "XtsCommonProto";

enum ShardingMode {
  SHARDING_MODE_UNSPECIFIED = 0;
  // Let a test runner to take care of sharding.
  RUNNER = 1;
  // Schedule each module as a separate command
  MODULE = 2;
}

// Device info used to load tests.
message DeviceInfo {
  string device_id = 1;
  optional string supported_abi_list = 2;
  optional string supported_abi = 3;
}

// Version of a test suite.
//
// The format of the version for a test suite is
// "<major>[.<minor>][.<patch>]_<revision>", e.g. "16.1_r1", "16_r1", "8.0_r26",
// "4.0.3_r4", "15_sts-r46".
message TestSuiteVersion {
  int32 major = 1;
  int32 minor = 2;
  int32 patch = 3;
  int32 revision = 4;
}

// Info of a test suite.
//
// To properly expose related info, a test suite must include a
// `test-suite-info.properties` file in its jar resources.
message TestSuiteInfo {
  string xts_root_dir = 1;
  // The type of the test suite, e.g., "cts".
  string xts_type = 2;
  // The build number of the test suite, e.g., "12345".
  string build_number = 3;
  // The target archs supported by the test suite, e.g., ["arm64", "x86_64"].
  repeated string target_archs = 4;
  // The short name of the test suite, e.g., "CTS".
  string name = 5;
  // The full name of the test suite, e.g., "Compatibility Test Suite".
  string fullname = 6;
  // The version name of the test suite, e.g., "16.1_r1".
  string version = 7;
  optional TestSuiteVersion test_suite_version = 8;
  map<string, string> suite_properties = 9;
}
