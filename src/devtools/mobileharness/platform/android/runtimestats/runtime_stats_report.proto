syntax = "proto2";

package mobileharness.platform.android.runtimestats;

option java_package = "com.google.devtools.mobileharness.platform.android.runtimestats.proto";
option java_multiple_files = true;
option java_outer_classname = "RuntimeStatsReportProto";

// Report generated by AndroidRuntimeStatsDecorator.
message RuntimeStatsReport {
  message CpuInfo {
    // The architecture or hardware name of the CPU, e.g. "aarch64", "i686".
    optional string cpu_architecture = 1;

    // CPU clock speed in kHz.
    optional int32 cpu_speed_khz = 2;

    // Number of CPU cores.
    optional int32 core_count = 3;
  }

  message MemoryInfo {
    // Total memory available on the device in KiB.
    optional int64 total_memory_kib = 1;

    // Maximum memory that can be allocated to the process in KiB.
    optional int64 memory_cap_kib = 2;
  }

  optional CpuInfo cpu_info = 1;

  optional MemoryInfo memory_info = 2;
}
